name: prod-server-1
host: prod1.example.com
port: 22
username: deploy
private_key_path: ~/.ssh/deploy_key
remote_path: /etc/myapp
backup: true
backup_dir: /etc/myapp/backups
files:
  - appconfig.yaml
pre_deploy:
  - echo "Starting deployment..."
post_deploy:
  - systemctl reload myapp
  - echo "Deployment completed"
